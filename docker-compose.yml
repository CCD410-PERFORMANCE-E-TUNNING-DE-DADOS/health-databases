version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: health-postgres
    restart: unless-stopped

    env_file:
      - ./postgresql/docker/.env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/docker/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - health-net


  mongodb:
    image: mongo:7
    container_name: health-mongodb
    restart: unless-stopped

    env_file:
      - ./mongodb/docker/.env

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}

    ports:
      - "${MONGO_PORT}:27017"

    volumes:
      - mongo_data:/data/db
      - ./mongodb/docker/init.js:/docker-entrypoint-initdb.d/init.js:ro

    networks:
      - health-net


  cassandra:
    image: cassandra:4.1
    container_name: health-cassandra
    restart: unless-stopped

    env_file:
      - ./cassandra/docker/.env

    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      CASSANDRA_DC: ${CASSANDRA_DC}
      CASSANDRA_RACK: ${CASSANDRA_RACK}
      CASSANDRA_ENDPOINT_SNITCH: ${CASSANDRA_ENDPOINT_SNITCH}

    ports:
      - "${CASSANDRA_PORT}:9042"

    volumes:
      - cassandra_data:/var/lib/cassandra

    networks:
      - health-net


volumes:
  postgres_data:
  mongo_data:
  cassandra_data:


networks:
  health-net:
    driver: bridge
